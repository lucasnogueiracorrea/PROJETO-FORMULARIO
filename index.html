<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário | Web</title>
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="imagem/favicon.ico.ico" type="image/x-icon">
</head>
<body>
    <div class="conteiner">
        <h1 id="titulo">Login</h1>
        <div class="main">
            <h2 id="subtitulo">Seu e-mail</h2>
            <input id="txt1" type="text" name="email" id="email" placeholder=" contato@hotmail.com">
            <h2 id="subtitulo2">Sua senha</h2>
            <input id="txt2" type="password" name="senha" id="senha" placeholder=" password">
        </div>
        <div class="box">
            <input id="box" type="checkbox" name="logado" id="logado"> <p id="p1">Manter-me logado</p>
         </div>
         <div class="footer1">   
            <input id="but1" type="button" value="Entrar">
        </div>
        <div class="footer2">
            <p id="pergunta">Ainda não tem conta?</p>
            <input id="but2" type="button" value="Cadastre-se">
        </div>
    </div>        
</body>
</html>
